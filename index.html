<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moloco - 移除 Creative</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, -apple-system, sans-serif; background: #f1f5f9; min-height: 100vh; padding: 32px 16px; color: #1a1a1a; }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .sub { color: #666; font-size: 14px; margin-bottom: 24px; }
  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }
  .input-wrap { position: relative; }
  input[type=text], input[type=password] {
    width: 100%; padding: 9px 12px; border-radius: 8px;
    border: 1.5px solid #ddd; font-size: 13px; outline: none;
    font-family: inherit;
  }
  input:focus { border-color: #2563eb; }
  .toggle-btn {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: #888; font-size: 12px;
    padding: 2px 6px;
  }
  .run-btn {
    width: 100%; padding: 11px 0; border-radius: 8px; border: none;
    cursor: pointer; font-size: 14px; font-weight: 600;
    background: #2563eb; color: #fff; margin-top: 18px;
    transition: background 0.15s;
  }
  .run-btn:hover:not(:disabled) { background: #1d4ed8; }
  .run-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .loading { text-align: center; padding: 32px; color: #666; font-size: 14px; }
  .result-box { border-radius: 10px; padding: 16px 18px; font-size: 13px; line-height: 1.6; }
  .result-box.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
  .result-box.error   { background: #fff0f0; border: 1px solid #fca5a5; color: #b91c1c; }
  .result-box.warn    { background: #fffbeb; border: 1px solid #fde68a; color: #b45309; }
  .result-box .detail { font-size: 12px; color: #6b7280; margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🗑️ 移除 Creative</h1>
  <p class="sub">从指定 Campaign 的所有 Creative Group 中移除某个 Creative</p>

  <div class="card">
    <label>API Key</label>
    <div class="input-wrap">
      <input type="password" id="apiKey" placeholder="输入 Moloco API Key（ca_ 开头）">
      <button class="toggle-btn" onclick="toggleKey()">显示</button>
    </div>

    <label>Ad Account ID</label>
    <input type="text" id="adAccountId" value="KZjURzyi05L9jEUc">

    <label>Campaign ID</label>
    <input type="text" id="campaignId" placeholder="输入 Campaign ID">

    <label>Creative ID（要移除的，多个请换行或用逗号分隔）</label>
    <textarea id="creativeId" placeholder="输入 Creative ID，例如：&#10;abc123&#10;def456&#10;或 abc123, def456"
      rows="4" style="width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #ddd;font-size:13px;outline:none;font-family:inherit;resize:vertical;"
      onfocus="this.style.borderColor='#2563eb'" onblur="this.style.borderColor='#ddd'"></textarea>

    <button class="run-btn" id="runBtn" onclick="run()">🚀 开始执行</button>
  </div>

  <div id="output"></div>
</div>

<script>
const WEBHOOK = "https://moloco.app.n8n.cloud/webhook/remove-creative";

function toggleKey() {
  const inp = document.getElementById("apiKey");
  inp.type = inp.type === "password" ? "text" : "password";
  inp.nextElementSibling.textContent = inp.type === "password" ? "显示" : "隐藏";
}

async function run() {
  const api_key      = document.getElementById("apiKey").value.trim();
  const ad_account_id = document.getElementById("adAccountId").value.trim();
  const campaign_id  = document.getElementById("campaignId").value.trim();
  const creativeRaw = document.getElementById("creativeId").value;
  const creative_ids = creativeRaw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

  if (!api_key || !ad_account_id || !campaign_id || !creative_ids.length) {
    alert("请填写所有字段");
    return;
  }

  const btn = document.getElementById("runBtn");
  btn.disabled = true;
  btn.textContent = "⏳ 执行中…";
  document.getElementById("output").innerHTML = `
    <div class="card loading">
      <div style="font-size:28px;margin-bottom:10px">⏳</div>
      <div>正在处理，请稍候…</div>
    </div>`;

  try {
    const res = await fetch(WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ api_key, ad_account_id, campaign_id, creative_ids }),
    });

    if (!res.ok) throw new Error(`请求失败 (HTTP ${res.status})`);

    let data = await res.json();
    if (Array.isArray(data)) data = data[0];
    if (data.json) data = data.json;

    const type = data.success ? "success" : "warn";
    const icon = data.success ? "✅" : "⚠️";
    document.getElementById("output").innerHTML = `
      <div class="result-box ${type}">
        <div><b>${icon} ${data.message}</b></div>
        <div class="detail">
          Campaign ID: ${data.campaign_id}<br>
          Creative ID: ${(Array.isArray(data.creative_ids) ? data.creative_ids : [data.creative_ids]).join(', ')}<br>
          更新的 Group 数：${data.groups_updated}
        </div>
      </div>`;

  } catch (err) {
    document.getElementById("output").innerHTML = `
      <div class="result-box error">
        ❌ 请求失败：${err.message}
        <div class="detail">请确认 n8n Webhook 处于监听状态，且所有字段填写正确</div>
      </div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "🚀 开始执行";
  }
}
</script>
</body>
</html>
