<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moloco — Remove Creative</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 50%, #fdf4ff 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px 64px;
    color: #1e1b4b;
  }

  .wrap { width: 100%; max-width: 520px; }

  /* ── Header ── */
  .header { margin-bottom: 32px; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.25);
    color: #6366f1; font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 4px 10px; border-radius: 99px;
    margin-bottom: 14px;
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #6366f1; }
  h1 {
    font-size: 28px; font-weight: 700; color: #1e1b4b;
    line-height: 1.2; margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .sub { font-size: 13px; color: #6b7280; font-weight: 500; line-height: 1.6; }

  /* ── Card ── */
  .card {
    background: #ffffff;
    border: 1px solid #e0e7ff;
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(99,102,241,0.08), 0 1px 4px rgba(0,0,0,0.04);
  }

  /* ── Form Fields ── */
  .field { margin-bottom: 18px; }
  .field:last-of-type { margin-bottom: 0; }

  label {
    display: block;
    font-size: 11px; font-weight: 700; letter-spacing: 0.07em;
    text-transform: uppercase; color: #6b7280;
    margin-bottom: 7px;
  }

  .input-wrap { position: relative; }

  input[type=text], input[type=password], textarea {
    width: 100%;
    background: #f9fafb;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 11px 14px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px; font-weight: 500;
    color: #111827;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }
  input[type=text]:focus, input[type=password]:focus, textarea:focus {
    border-color: #6366f1;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
  }
  input::placeholder, textarea::placeholder { color: #d1d5db; }
  textarea { resize: vertical; min-height: 100px; line-height: 1.6; }

  .toggle-btn {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: #9ca3af; font-size: 11px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: color 0.15s;
  }
  .toggle-btn:hover { color: #6366f1; }

  /* ── Divider ── */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
  }
  .divider-line { flex: 1; height: 1px; background: #e5e7eb; }
  .divider-text { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #d1d5db; }

  /* ── Button ── */
  .run-btn {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.04em;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    margin-top: 22px;
    box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .run-btn:hover:not(:disabled) {
    opacity: 0.92;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(99,102,241,0.4);
  }
  .run-btn:active:not(:disabled) { transform: translateY(0); }
  .run-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

  /* ── Loading ── */
  .loading-card {
    background: #fff;
    border: 1px solid #e0e7ff;
    border-radius: 20px;
    padding: 40px 28px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(99,102,241,0.08);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e0e7ff;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; font-weight: 600; color: #9ca3af; }

  /* ── Result ── */
  .result-card {
    border-radius: 20px;
    padding: 24px 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .result-card.success { background: #f0fdf4; border: 1px solid #bbf7d0; }
  .result-card.warn    { background: #fffbeb; border: 1px solid #fde68a; }
  .result-card.error   { background: #fff1f2; border: 1px solid #fecdd3; }

  .result-icon { font-size: 32px; margin-bottom: 12px; }
  .result-title {
    font-size: 15px; font-weight: 700; margin-bottom: 16px; line-height: 1.4;
  }
  .result-card.success .result-title { color: #15803d; }
  .result-card.warn .result-title    { color: #b45309; }
  .result-card.error .result-title   { color: #be123c; }

  .result-meta { display: flex; flex-direction: column; gap: 8px; }
  .meta-row { display: flex; align-items: flex-start; gap: 10px; font-size: 12px; }
  .meta-label {
    font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
    color: #9ca3af; min-width: 110px; flex-shrink: 0; padding-top: 1px;
  }
  .meta-value { color: #6b7280; font-weight: 500; word-break: break-all; line-height: 1.6; }
  .meta-value.highlight { color: #6366f1; font-weight: 700; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: #eef2ff; border: 1px solid #c7d2fe;
    color: #4f46e5; font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 6px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="badge"><span class="badge-dot"></span>Moloco DSP Tools</div>
    <h1>Remove Creative</h1>
    <p class="sub">从指定 Campaign 的所有 Creative Group 中批量移除 Creative</p>
  </div>

  <div class="card">
    <div class="field">
      <label>API Key</label>
      <div class="input-wrap">
        <input type="password" id="apiKey" placeholder="ca_xxxxxxxxxxxxxxxx">
        <button class="toggle-btn" onclick="toggleKey()">Show</button>
      </div>
    </div>

    <div class="field">
      <label>Ad Account ID</label>
      <input type="text" id="adAccountId" placeholder="输入 Ad Account ID">
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">Target</div>
      <div class="divider-line"></div>
    </div>

    <div class="field">
      <label>Campaign ID</label>
      <input type="text" id="campaignId" placeholder="输入 Campaign ID">
    </div>

    <div class="field">
      <label>Creative IDs <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#3a3a50">— 多个请换行或逗号分隔</span></label>
      <textarea id="creativeId" placeholder="abc123&#10;def456&#10;ghi789"></textarea>
    </div>

    <button class="run-btn" id="runBtn" onclick="run()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Remove Creative
    </button>
  </div>

  <div id="output"></div>
</div>

<script>
const WEBHOOK = "https://moloco.app.n8n.cloud/webhook/remove-creative";

function toggleKey() {
  const inp = document.getElementById("apiKey");
  const btn = inp.nextElementSibling;
  inp.type = inp.type === "password" ? "text" : "password";
  btn.textContent = inp.type === "password" ? "Show" : "Hide";
}

async function run() {
  const api_key       = document.getElementById("apiKey").value.trim();
  const ad_account_id = document.getElementById("adAccountId").value.trim();
  const campaign_id   = document.getElementById("campaignId").value.trim();
  const creativeRaw   = document.getElementById("creativeId").value;
  const creative_ids  = creativeRaw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

  if (!api_key || !ad_account_id || !campaign_id || !creative_ids.length) {
    alert("请填写所有字段");
    return;
  }

  const btn = document.getElementById("runBtn");
  btn.disabled = true;
  btn.innerHTML = `<div style="width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite"></div> Processing…`;

  document.getElementById("output").innerHTML = `
    <div class="loading-card">
      <div class="spinner"></div>
      <div class="loading-text">正在处理，请稍候…</div>
    </div>`;

  try {
    const res = await fetch(WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ api_key, ad_account_id, campaign_id, creative_ids }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    let data = await res.json();
    if (Array.isArray(data)) data = data[0];
    if (data.json) data = data.json;

    const ids = Array.isArray(data.creative_ids) ? data.creative_ids : [data.creative_ids];
    const type = data.success ? "success" : "warn";
    const icon = data.success ? "✅" : "⚠️";

    document.getElementById("output").innerHTML = `
      <div class="result-card ${type}">
        <div class="result-icon">${icon}</div>
        <div class="result-title">${data.message}</div>
        <div class="result-meta">
          <div class="meta-row">
            <span class="meta-label">Campaign</span>
            <span class="meta-value">${data.campaign_id}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Creatives</span>
            <div class="tag-list">${ids.map(id => `<span class="tag">${id}</span>`).join('')}</div>
          </div>
          <div class="meta-row">
            <span class="meta-label">Groups Updated</span>
            <span class="meta-value highlight">${data.groups_updated}</span>
          </div>
        </div>
      </div>`;

  } catch (err) {
    document.getElementById("output").innerHTML = `
      <div class="result-card error">
        <div class="result-icon">❌</div>
        <div class="result-title">请求失败</div>
        <div class="result-meta">
          <div class="meta-row">
            <span class="meta-label">Error</span>
            <span class="meta-value">${err.message}</span>
          </div>
        </div>
      </div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg> Remove Creative`;
  }
}
</script>
</body>
</html>
